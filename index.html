<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estrelas Romance — Assistente</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --surface: #111111; --surface2: #1a1a1a;
  --border: rgba(255,255,255,0.07); --pink: #E0006E;
  --pink-light: #ff4da6; --white: #ffffff;
  --text: #f5f5f5; --text-muted: #888; --radius: 20px;
}
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); flex-shrink: 0; }
.header-info h1 { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--white); }
.btn-config { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 11px; }

/* Config Panel */
.config-panel { display: none; background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 20px; flex-direction: column; gap: 10px; }
.config-panel.open { display: flex; }
.config-panel textarea, .config-panel input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 10px; font-size: 12px; outline: none; }

/* Mensagens */
#messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; }
.msg { display: flex; gap: 8px; max-width: 85%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.bot { align-self: flex-start; }

.bubble { padding: 10px 14px; border-radius: var(--radius); font-size: 13.5px; line-height: 1.6; word-break: break-word; position: relative; }
.user .bubble { background: var(--pink); color: #fff; border-bottom-right-radius: 5px; }
.bot .bubble { background: var(--surface2); color: #ccc; border: 1px solid var(--border); border-bottom-left-radius: 5px; }

/* Markdown bot */
.bot .bubble p { margin-bottom: 8px; }
.bot .bubble ul { padding-left: 20px; margin: 8px 0; }
.bot .bubble strong { color: white; font-weight: 600; }

/* Digitação (Três Pontinhos) */
.typing { display: flex; gap: 4px; padding: 10px 15px; align-items: center; }
.typing span { width: 6px; height: 6px; background: var(--pink); border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite ease-in-out; }
.typing span:nth-child(1) { animation-delay: -0.32s; }
.typing span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

/* Botões */
.quick-replies { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; padding-left: 10px; }
.qr-btn { background: transparent; border: 1px solid rgba(224,0,110,0.45); color: var(--pink-light); padding: 5px 12px; border-radius: 20px; font-size: 11.5px; cursor: pointer; text-decoration: none; transition: 0.2s; }
.qr-btn:hover { background: rgba(224,0,110,0.1); }

/* Welcome */
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 32px 20px; }
.sug-btn { background: var(--surface2); border: 1px solid var(--border); color: #ccc; padding: 8px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; margin: 4px; }

/* Footer */
footer { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.input-row { display: flex; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 9px 10px; }
#input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 13.5px; resize: none; max-height: 100px; }
#send { width: 34px; height: 34px; border-radius: 10px; background: var(--pink); border: none; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<header>
  <div class="header-info"><h1>Estrelas Romance</h1><div style="font-size:10px; color:#3dd68c;">● Assistente Online</div></div>
  <button class="btn-config" onclick="toggleConfig()">⚙️ Configurar</button>
</header>

<div class="config-panel" id="configPanel">
  <textarea id="systemPrompt" rows="12">Você é a Estrela, assistente virtual da Romance e Favorita (Crisdu).
Sua missão é ser o primeiro contato acolhedor e inteligente.

DIRETRIZES:
- Use "Empreendedora de Sucesso". Emojis: ✨, 🌟, 💖.
- PRIMEIRA MENSAGEM: Cumprimente, pergunte o nome dela e a Categoria Estrela atual.
- NOVAS CONSULTORAS: Apresente sorteios de Motos, Carro de R$ 80k e o Conquistou Levou.
- TÉCNICO: 1 Estrela (1-999); 2 Estrelas (1.000-1.999); 3 Estrelas (2.000-2.999); 4 Estrelas (3.000-3.999); 5 Estrelas (4.000-9.999); Superstar (10.000+). R$ 1 = 1 pt. 
- JANELAS DO CONQUISTOU LEVOU: 20/01-28/02 e 10/08-22/09.
- SORTEIOS: 1º sorteio: 06/08/2026, mas a empreendedora acumula pontos até o dia 02/08/2026 (data de corte); 2ª sorteio: 31/12/2026, mas acumula pontos até 27/12/2026 (data de corte)
- SAC: Direcione para (51) 98274-0505 apenas em casos críticos ou inadimplência.

Respostas: Máx 5 linhas. Sempre termine motivando!

###OPCOES:["Quero ser consultora","Quais os prêmios do sorteio?","Como funciona a camisa polo?"]###</textarea>
  <input type="password" id="apiKey" placeholder="Chave API do Groq" style="margin-top:10px;">
</div>

<div id="messages">
  <div class="welcome" id="welcome">
    <h2 style="font-family:'Cormorant Garamond'; font-size:24px; margin-bottom:10px;">Olá, Esmpreendedora de Sucesso! ✨</h2>
    <p style="color:var(--text-muted); font-size:13px; margin-bottom:20px;">Sou a Estrela. Pronta para brilhar hoje?</p>
    <div>
      <button class="sug-btn" onclick="sendQuick('Oi! Quero saber mais sobre o programa')">Começar atendimento</button>
      <button class="sug-btn" onclick="sendQuick('Quero ser consultora')">Quero ser consultora</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Digite sua dúvida..." onkeydown="handleKey(event)"></textarea>
    <button id="send" onclick="sendMessage()">🚀</button>
  </div>
</footer>

<script>
const history = [];

function toggleConfig() {
  const p = document.getElementById('configPanel'); p.classList.toggle('open');
  if(p.classList.contains('open')) document.getElementById('apiKey').value = localStorage.getItem('groq_key') || '';
}

document.getElementById('apiKey').addEventListener('input', (e) => localStorage.setItem('groq_key', e.target.value));
document.getElementById('systemPrompt').addEventListener('input', (e) => localStorage.setItem('prompt', e.target.value));

function handleKey(e) { if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } }
function sendQuick(t) { document.getElementById('input').value = t; sendMessage(); }

function showTyping() {
  const m = document.getElementById('messages');
  const t = document.createElement('div');
  t.id = 'typing-bubble'; t.className = 'msg bot';
  t.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
  m.appendChild(t); m.scrollTop = m.scrollHeight;
}

function appendMessage(role, text, opts) {
  if(document.getElementById('welcome')) document.getElementById('welcome').remove();
  const m = document.getElementById('messages');
  const wrap = document.createElement('div'); wrap.className = `msg ${role}`;
  const bubble = document.createElement('div'); bubble.className = 'bubble';
  
  role === 'bot' ? bubble.innerHTML = marked.parse(text) : bubble.textContent = text;
  wrap.appendChild(bubble);
  m.appendChild(wrap);

  if(role === 'bot') {
    const qr = document.createElement('div'); qr.className = 'quick-replies';
    if(opts) opts.forEach(o => { 
      const btn = document.createElement('button'); btn.className='qr-btn'; 
      btn.textContent=o; btn.onclick=()=>sendQuick(o); qr.appendChild(btn); 
    });
    const sac = document.createElement('a'); sac.className='qr-btn'; 
    sac.href='https://wa.me/5551982740505'; sac.target='_blank'; sac.textContent='💬 SAC WhatsApp';
    sac.style.cssText = 'background:#25D366; color:white; border:none; font-weight:500;';
    qr.appendChild(sac); m.appendChild(qr);
  }
  m.scrollTop = m.scrollHeight;
}

async function sendMessage() {
  const i = document.getElementById('input'); const t = i.value.trim(); if(!t) return;
  const k = document.getElementById('apiKey').value || localStorage.getItem('groq_key');
  const p = document.getElementById('systemPrompt').value || localStorage.getItem('prompt');
  if(!k){ alert('Configure a chave ⚙️'); toggleConfig(); return; }
  
  appendMessage('user', t); i.value = ''; history.push({role:'user', content:t});
  showTyping();

  try {
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${k}`},
      body: JSON.stringify({model:'llama-3.3-70b-versatile', messages:[{role:'system', content:p}, ...history]})
    });
    document.getElementById('typing-bubble').remove();
    const d = await r.json(); const raw = d.choices[0].message.content;
    const clean = raw.replace(/###OPCOES:\[.*?\]###/gs, '').trim();
    const match = raw.match(/###OPCOES:\[(.*?)\]###/);
    appendMessage('bot', clean, match ? JSON.parse('['+match[1]+']') : null);
    history.push({role:'assistant', content:raw});
  } catch(e){ if(document.getElementById('typing-bubble')) document.getElementById('typing-bubble').remove(); appendMessage('bot', 'Erro de conexão ❌'); }
}

window.onload = () => {
  if(localStorage.getItem('groq_key')) document.getElementById('apiKey').value = localStorage.getItem('groq_key');
  if(localStorage.getItem('prompt')) document.getElementById('systemPrompt').value = localStorage.getItem('prompt');
};
</script>
</body>
</html>
