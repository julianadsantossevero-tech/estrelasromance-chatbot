<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente de Atendimento</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #232329;
    --border: rgba(255,255,255,0.08);
    --accent: #6e56cf;
    --accent-glow: rgba(110,86,207,0.25);
    --accent-light: #9d87f5;
    --text: #f0eff4;
    --text-muted: #8b8a96;
    --text-soft: #c4c3cc;
    --user-bubble: #6e56cf;
    --bot-bubble: #232329;
    --radius: 18px;
    --radius-sm: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6e56cf, #9d87f5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .header-info h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--text);
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #3dd68c;
    box-shadow: 0 0 6px #3dd68c;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .config-btn {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .config-btn:hover { border-color: var(--accent); color: var(--accent-light); }

  /* Config panel */
  .config-panel {
    display: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    flex-shrink: 0;
  }
  .config-panel.open { display: block; }

  .config-panel label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 8px;
  }

  .config-panel textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 12px;
    resize: vertical;
    min-height: 90px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  .config-panel textarea:focus { border-color: var(--accent); }

  .config-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 82%;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .bot .msg-avatar  { background: linear-gradient(135deg, #6e56cf, #9d87f5); }
  .user .msg-avatar { background: var(--surface2); border: 1px solid var(--border); }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.65;
    max-width: 100%;
    word-break: break-word;
  }

  .user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .bot .bubble {
    background: var(--bot-bubble);
    color: var(--text-soft);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 16px;
  }
  .typing span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-light);
    animation: bounce 1.2s infinite;
    opacity: 0.6;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* Quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 4px 0 0 42px;
  }
  .quick-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent-light);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-btn:hover { background: var(--accent-glow); }

  /* Input area */
  footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

  #input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    min-height: 22px;
    line-height: 1.5;
  }
  #input::placeholder { color: var(--text-muted); }

  #send {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    color: white;
  }
  #send:hover { background: var(--accent-light); transform: scale(1.05); }
  #send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .footer-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 10px;
  }

  /* Welcome */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 40px 20px;
    gap: 16px;
    animation: fadeUp 0.5s ease;
  }
  .welcome-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6e56cf, #9d87f5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 0 32px var(--accent-glow);
    margin-bottom: 8px;
  }
  .welcome h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
  }
  .welcome p { font-size: 14px; color: var(--text-muted); line-height: 1.7; max-width: 320px; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }
  .sug-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-soft);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sug-btn:hover { border-color: var(--accent); color: var(--accent-light); }
</style>
</head>
<body>

<header>
  <div class="avatar">✦</div>
  <div class="header-info">
    <h1>Assistente Virtual</h1>
    <div class="status"><span class="dot"></span> Online agora</div>
  </div>
  <button class="config-btn" onclick="toggleConfig()">⚙ Personalizar</button>
</header>

<div class="config-panel" id="configPanel">
  <label>Instruções do atendente (system prompt)</label>
  <textarea id="systemPrompt">Você é um assistente virtual de atendimento ao cliente, simpático, eficiente e profissional. Responda em português brasileiro. Seja direto e útil. Se não souber algo específico da empresa, ofereça alternativas como encaminhar para um humano, checar o site ou entrar em contato por outros canais. Mantenha as respostas concisas mas completas.</textarea>
  <p class="config-hint">💡 Personalize as instruções acima para adaptar o chatbot à sua empresa.</p>
</div>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">✦</div>
    <h2>Olá! Como posso ajudar?</h2>
    <p>Estou aqui para responder suas dúvidas e resolver o que precisar.</p>
    <div class="suggestions">
      <button class="sug-btn" onclick="sendQuick('Quais são os horários de atendimento?')">Horários de atendimento</button>
      <button class="sug-btn" onclick="sendQuick('Como faço uma troca ou devolução?')">Trocas e devoluções</button>
      <button class="sug-btn" onclick="sendQuick('Onde posso acompanhar meu pedido?')">Rastrear pedido</button>
      <button class="sug-btn" onclick="sendQuick('Preciso falar com um humano')">Falar com humano</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Digite sua mensagem..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="footer-hint">Powered by Claude · Pressione Enter para enviar</p>
</footer>

<script>
const history = [];

function toggleConfig() {
  document.getElementById('configPanel').classList.toggle('open');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendQuick(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function appendMessage(role, text) {
  removeWelcome();
  const msgs = document.getElementById('messages');

  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'bot' ? '✦' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  wrap.appendChild(av);
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

function showTyping() {
  removeWelcome();
  const msgs = document.getElementById('messages');

  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = '✦';

  const bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  bubble.innerHTML = '<span></span><span></span><span></span>';

  wrap.appendChild(av);
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send').disabled = true;

  appendMessage('user', text);
  history.push({ role: 'user', content: text });

  showTyping();

  try {
    const systemPrompt = document.getElementById('systemPrompt').value;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: history
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data?.content?.[0]?.text || 'Desculpe, não consegui processar sua mensagem. Tente novamente.';
    appendMessage('bot', reply);
    history.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping();
    appendMessage('bot', 'Ocorreu um erro ao conectar com o assistente. Verifique sua conexão e tente novamente.');
    history.pop();
  }

  document.getElementById('send').disabled = false;
  input.focus();
}
</script>
</body>
</html>
